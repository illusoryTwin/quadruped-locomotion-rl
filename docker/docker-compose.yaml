# =============================================================================
# Quadruped Locomotion RL - Training Container
# =============================================================================
#
# Build & run:
#   cd quadruped-locomotion-rl/docker
#   docker compose build
#   docker compose run quadruped-train
#
# Source code is bind-mounted for live editing — no rebuild needed for code changes.
#
# Required sibling repos (relative to this repo's parent directory):
#   ../IsaacLab/
#   ../unitree_robotics/unitree_rl_lab/

x-gpu-deploy: &gpu-deploy
  resources:
    reservations:
      devices:
        - driver: nvidia
          count: all
          capabilities: [gpu]

services:
  quadruped-train:
    env_file: .env
    build:
      context: ../../
      dockerfile: quadruped-locomotion-rl/docker/Dockerfile
      args:
        - ISAACSIM_BASE_IMAGE=${ISAACSIM_BASE_IMAGE}
        - ISAACSIM_VERSION=${ISAACSIM_VERSION}
        - ISAACSIM_ROOT_PATH=${DOCKER_ISAACSIM_ROOT_PATH}
        - ISAACLAB_PATH=${DOCKER_ISAACLAB_PATH}
    image: quadruped-train
    container_name: quadruped-train
    environment:
      - ISAACSIM_PATH=${DOCKER_ISAACLAB_PATH}/_isaac_sim
      - OMNI_KIT_ALLOW_ROOT=1
    volumes:
      # Isaac Sim cache volumes (persistent across rebuilds)
      - type: volume
        source: isaac-cache-kit
        target: ${DOCKER_ISAACSIM_ROOT_PATH}/kit/cache
      - type: volume
        source: isaac-cache-ov
        target: ${DOCKER_USER_HOME}/.cache/ov
      - type: volume
        source: isaac-cache-pip
        target: ${DOCKER_USER_HOME}/.cache/pip
      - type: volume
        source: isaac-cache-gl
        target: ${DOCKER_USER_HOME}/.cache/nvidia/GLCache
      - type: volume
        source: isaac-cache-compute
        target: ${DOCKER_USER_HOME}/.nv/ComputeCache
      - type: volume
        source: isaac-logs
        target: ${DOCKER_USER_HOME}/.nvidia-omniverse/logs
      - type: volume
        source: isaac-data
        target: ${DOCKER_USER_HOME}/.local/share/ov/data
      # Bind-mount source code for live editing
      - type: bind
        source: ../
        target: /workspace/quadruped-locomotion-rl
      - type: bind
        source: ../../unitree_robotics/unitree_rl_lab
        target: /workspace/unitree_rl_lab
      # Persistent training logs
      - type: volume
        source: train-logs
        target: /workspace/quadruped-locomotion-rl/logs
    network_mode: host
    deploy: *gpu-deploy
    entrypoint: bash
    stdin_open: true
    tty: true

volumes:
  isaac-cache-kit:
  isaac-cache-ov:
  isaac-cache-pip:
  isaac-cache-gl:
  isaac-cache-compute:
  isaac-logs:
  isaac-data:
  train-logs:
