# Go2 Flat Terrain Deployment Config (Modular Format)
# Compatible with RLController class

robot: go2

# Policy checkpoint (relative to repo root)
checkpoint: logs/rsl_rl/unitree_go2_walk/2026-01-25_23-43-51/exported/policy.pt

# Joint order (Isaac Lab convention: by joint type)
joint_order:
  - FL_hip_joint
  - FR_hip_joint
  - RL_hip_joint
  - RR_hip_joint
  - FL_thigh_joint
  - FR_thigh_joint
  - RL_thigh_joint
  - RR_thigh_joint
  - FL_calf_joint
  - FR_calf_joint
  - RL_calf_joint
  - RR_calf_joint

# Initial state
init_state:
  default_joint_angles:
    FL_hip_joint: 0.1
    FR_hip_joint: -0.1
    RL_hip_joint: 0.1
    RR_hip_joint: -0.1
    FL_thigh_joint: 0.8
    FR_thigh_joint: 0.8
    RL_thigh_joint: 1.0
    RR_thigh_joint: 1.0
    FL_calf_joint: -1.5
    FR_calf_joint: -1.5
    RL_calf_joint: -1.5
    RR_calf_joint: -1.5

# Observation configuration
observation:
  # Order of observation terms (must match training)
  order:
    - base_ang_vel
    - projected_gravity
    - commands
    - dof_pos
    - dof_vel
    - actions
    - height_scan

  # Dimension of each term
  dims:
    base_ang_vel: 3
    projected_gravity: 3
    commands: 3
    dof_pos: 12
    dof_vel: 12
    actions: 12
    height_scan: 187

  # Scale factors (1.0 = no scaling)
  scale:
    base_ang_vel: 1.0
    projected_gravity: 1.0
    commands: 1.0
    dof_pos: 1.0
    dof_vel: 1.0
    actions: 1.0
    height_scan: 1.0

  # Clip bounds (inf = no clipping)
  clip:
    base_ang_vel: .inf
    projected_gravity: .inf
    commands: .inf
    dof_pos: .inf
    dof_vel: .inf
    actions: .inf
    height_scan: .inf

  # History settings
  num_obs_hist: 1  # Single frame (no history stacking)
  hist_by_term: false

# Control configuration
control:
  control_type: P  # Position control
  action_scale: 0.5
  clip_actions: 1.0
  control_dt: 0.02  # 50 Hz

  # PD gains
  stiffness:
    hip: 25.0
    thigh: 25.0
    calf: 25.0
  damping:
    hip: 0.5
    thigh: 0.5
    calf: 0.5

  # Torque limiting (disabled for basic locomotion)
  limit_actions_by_torque: false
  torque_limits:
    hip: 23.7
    thigh: 23.7
    calf: 45.43

# Command configuration
commands:
  names:
    - vx
    - vy
    - wz
  ranges:
    vx: [-1.5, 1.5]
    vy: [-1.0, 1.0]
    wz: [-1.5, 1.5]
  scales:
    vx: 1.0
    vy: 1.0
    wz: 1.0
  defaults:
    vx: 0.5
    vy: 0.0
    wz: 0.0

# DDS communication (for MuJoCo/real robot)
dds:
  domain_id: 1
  interface: lo  # "lo" for simulation, actual interface for real robot
