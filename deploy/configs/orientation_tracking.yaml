# Deploy config for go2_orientation_tracking
# Observation: 45 dims/frame x 10 history = 450 total
#
# orientation_commands: 3D body-frame velocity [lin_vel_x, lin_vel_y, ang_vel_z]
#   From HeadingVelocityCommand (UniformVelocityCommand with heading_command=True).
#   During training: heading error -> ang_vel_z, lin_vel_x/y sampled from (0,0).
#   At deploy time: provide [0, 0, ang_vel_z] for pure yaw rotation.
#   [0, 0, 0.5] = rotate left at 0.5 rad/s

observation_terms:
  - {name: base_ang_vel, dim: 3, source: imu_gyroscope}
  - {name: projected_gravity, dim: 3, source: imu_gravity}
  - {name: joint_pos, dim: 12, source: joint_pos_rel}
  - {name: joint_vel, dim: 12, source: joint_vel}
  - {name: actions, dim: 12, source: last_action}
  - {name: orientation_commands, dim: 3, source: command, default: [0.0, 0.0, 0.0]}

history_length: 10
action_scale: 0.5
control_dt: 0.02
kp: 25.0
kd: 0.5
